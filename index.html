<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE - Premium Italy Store</title>
<style>
body { font-family: Arial, sans-serif; margin:0; background:#f5f5f5; display:flex; }
header { background:black; color:gold; padding:20px; text-align:center; font-size:32px; font-weight:bold; letter-spacing:2px; width:100%; position:fixed; top:0; z-index:10; }
.banner { background:url('https://via.placeholder.com/1200x300/000000/FFD700?text=LUXE+Premium+Deals') no-repeat center; background-size:cover; color:white; text-align:center; padding:100px 20px 50px 20px; font-size:32px; font-weight:bold; text-shadow:2px 2px 8px black; margin-top:80px; width:100%; }
.sidebar { width:220px; background:#222; color:gold; padding:20px; height:calc(100vh - 80px); overflow-y:auto; position:fixed; top:80px; left:0; }
.sidebar h3 { margin-top:0; text-align:center; }
.sidebar input { width:100%; padding:5px; margin-bottom:10px; border-radius:5px; border:none; }
.sidebar ul { list-style:none; padding:0; }
.sidebar li { padding:5px; cursor:pointer; }
.sidebar li:hover { background:#444; }
.main { margin-left:240px; padding:20px; display:flex; flex-wrap:wrap; justify-content:center; margin-top:40px; }
.card { background:white; width:260px; margin:10px; padding:15px; box-shadow:0 0 10px rgba(0,0,0,0.1); border-radius:10px; text-align:center; position:relative; }
.card img { width:100%; border-radius:8px; }
.card h3 { margin:10px 0 5px 0; font-size:18px; color:#222; }
.card p { margin:5px 0; font-size:14px; color:#555; }
.price { color:green; font-weight:bold; font-size:16px; position:absolute; top:15px; right:15px; background:#f0f0f0; padding:5px 10px; border-radius:5px; }
.rating { color:orange; margin:5px 0; }
.btn { background:black; color:gold; padding:10px 15px; text-decoration:none; display:inline-block; margin-top:10px; border-radius:5px; font-weight:bold; }
footer { background:black; color:gold; text-align:center; padding:15px; font-size:14px; margin-top:40px; }

/* Overlay for Product Details */
.overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:999; }
.overlay-content { background:white; padding:20px; width:80%; max-width:800px; border-radius:10px; position:relative; }
.close-btn { position:absolute; top:10px; right:15px; font-size:24px; cursor:pointer; color:black; }
.overlay img { width:300px; float:left; margin-right:20px; border-radius:10px; }
.overlay h2 { margin-top:0; }
.clearfix::after { content:""; clear:both; display:table; }
</style>
</head>
<body>

<header>LUXE</header>

<div class="sidebar">
  <h3>Search Products</h3>
  <input type="text" id="searchBox" placeholder="Search..." onkeyup="filterProducts()">
  <ul id="productList"></ul>
</div>

<div class="main" id="mainProducts">
<!-- Products will load here -->
</div>

<!-- Product Detail Overlay -->
<div id="overlay" class="overlay">
  <div id="overlay-content" class="overlay-content"></div>
</div>

<footer>
&copy; 2026 LUXE - Premium Italy Store. All Rights Reserved.
</footer>

<script>
// Generate 50 Products
const products = [];
for(let i=1;i<=50;i++){
  products.push({
    title:`Luxury Product ${i}`,
    price:`€${Math.floor(Math.random()*1000)+50}`,
    rating:`⭐⭐⭐⭐${i%5}`,
    img:`https://via.placeholder.com/260x200/CCCCCC/000000?text=Product+${i}`,
    desc:`This is a premium product number ${i}. Perfect for Italy shipping and luxury buyers.`,
    link:"YOUR_AFFILIATE_LINK"
  });
}

// Load Products
const mainDiv=document.getElementById('mainProducts');
const listUl=document.getElementById('productList');
products.forEach((p,i)=>{
  // Main grid
  mainDiv.innerHTML += `
    <div class="card" id="product-${i}">
      <img src="${p.img}" alt="${p.title}">
      <span class="price">${p.price}</span>
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <p class="rating">${p.rating}</p>
      <a href="${p.link}" class="btn" onclick="showDetail(${i});return false;">Buy Now</a>
    </div>
  `;
  // Sidebar list
  listUl.innerHTML += `<li onclick="scrollToProduct(${i})">${p.title}</li>`;
});

// Overlay Functions
function showDetail(id){
  const p=products[id];
  document.getElementById('overlay').style.display='flex';
  document.getElementById('overlay-content').innerHTML=`
    <span class="close-btn" onclick="closeOverlay()">×</span>
    <div class="clearfix">
      <img src="${p.img}" alt="${p.title}">
      <h2>${p.title}</h2>
      <p class="price">${p.price}</p>
      <p>${p.desc}</p>
      <p class="rating">${p.rating}</p>
      <a href="${p.link}" class="btn">Buy Now</a>
    </div>
  `;
}
function closeOverlay(){ document.getElementById('overlay').style.display='none'; }
function scrollToProduct(id){ document.getElementById(`product-${id}`).scrollIntoView({behavior:'smooth'}); }

// Search Function
function filterProducts(){
  const val=document.getElementById('searchBox').value.toLowerCase();
  products.forEach((p,i)=>{
    const card=document.getElementById(`product-${i}`);
    const li=listUl.children[i];
    if(p.title.toLowerCase().includes(val)){
      card.style.display='block';
      li.style.display='block';
    } else {
      card.style.display='none';
      li.style.display='none';
    }
  });
}
</script>

</body>
</html>
